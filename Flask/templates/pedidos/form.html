{% extends "base.html" %}
{% block title %}Nuevo Pedido - MACUIN{% endblock %}
{% block content %}
<div class="mb-8"><h1 class="text-3xl font-bold text-gray-900">Nuevo Pedido</h1></div>
<div class="bg-white rounded-lg shadow-md p-6">
    <form method="POST" id="pedidoForm">
        <div id="items-container">
            <div class="item-row grid grid-cols-1 md:grid-cols-3 gap-4 mb-4 p-4 bg-gray-50 rounded-lg">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Autoparte</label>
                    <select name="autoparte_id[]" required class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                        <option value="">Selecciona una autoparte</option>
                        {% for autoparte in autopartes %}
                        <option value="{{ autoparte.id }}" data-precio="{{ autoparte.precio }}" data-stock="{{ autoparte.stock_disponible }}">
                            {{ autoparte.nombre }} (Stock: {{ autoparte.stock_disponible }}) - ${{ "%.2f"|format(autoparte.precio) }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Cantidad</label>
                    <input type="number" name="cantidad[]" min="1" required class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                </div>
                <div class="flex items-end">
                    <button type="button" onclick="removeItem(this)" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </div>
        </div>
        <button type="button" onclick="addItem()" class="mb-4 bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg">
            <i class="fas fa-plus mr-2"></i>Agregar Producto
        </button>
        <div class="flex space-x-3">
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg"><i class="fas fa-save mr-2"></i>Crear Pedido</button>
            <a href="{{ url_for('pedidos_list') }}" class="bg-gray-500 hover:bg-gray-600 text-white px-6 py-2 rounded-lg">Cancelar</a>
        </div>
    </form>
</div>
<script>
function addItem() {
    const container = document.getElementById('items-container');
    const firstItem = container.querySelector('.item-row');
    const newItem = firstItem.cloneNode(true);
    newItem.querySelector('select').selectedIndex = 0;
    newItem.querySelector('input').value = '';
    container.appendChild(newItem);
}
function removeItem(button) {
    const container = document.getElementById('items-container');
    if (container.querySelectorAll('.item-row').length > 1) {
        button.closest('.item-row').remove();
    } else {
        alert('Debe haber al menos un producto en el pedido');
    }
}
</script>
{% endblock %}
