{% extends "base.html" %}
{% block title %}{% if usuario %}Editar{% else %}Nuevo{% endif %} Usuario - MACUIN{% endblock %}
{% block content %}
<div class="mb-8"><h1 class="text-3xl font-bold text-gray-900">{% if usuario %}Editar{% else %}Nuevo{% endif %} Usuario</h1></div>
<div class="bg-white rounded-lg shadow-md p-6 max-w-2xl">
    <form method="POST">
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Nombre Completo *</label>
                <input type="text" name="nombre" required value="{% if usuario %}{{ usuario.nombre }}{% endif %}" 
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Email *</label>
                <input type="email" name="email" required value="{% if usuario %}{{ usuario.email }}{% endif %}" 
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Contraseña {% if not usuario %}*{% else %}(dejar en blanco para no cambiar){% endif %}</label>
                <input type="password" name="password" {% if not usuario %}required{% endif %} 
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Rol *</label>
                <select name="rol_id" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                    {% for rol in roles %}
                    <option value="{{ rol.id }}" {% if usuario and usuario.rol_id == rol.id %}selected{% endif %}>{{ rol.nombre }}</option>
                    {% endfor %}
                </select>
            </div>
            {% if usuario %}
            <div>
                <label class="flex items-center">
                    <input type="checkbox" name="activo" {% if usuario.activo %}checked{% endif %} class="h-4 w-4 text-blue-600 rounded">
                    <span class="ml-2 text-sm text-gray-700">Usuario activo</span>
                </label>
            </div>
            {% endif %}
        </div>
        <div class="mt-6 flex space-x-3">
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg"><i class="fas fa-save mr-2"></i>Guardar</button>
            <a href="{{ url_for('usuarios_list') }}" class="bg-gray-500 hover:bg-gray-600 text-white px-6 py-2 rounded-lg">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
